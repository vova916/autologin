<div class="modal fade" id="bookModal{{ room.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div
            class="modal-content border-0 shadow-[0_20px_50px_rgba(0,0,0,0.1)] rounded-[2rem] overflow-hidden backdrop-blur-xl bg-white/95">

            <div class="modal-header border-0 p-6 pb-2">
                <h5 class="modal-title font-bold text-2xl text-gray-900">Бронювання</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-6">
                <p class="text-gray-500 mb-6 text-sm">Ви бронюєте: <strong>{{ room.name }}</strong></p>

                <form method="POST" action="{% url 'book_page' room.id %}" class="space-y-4">
                    {% csrf_token %}

                    <div class="form-group mb-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ваше ім'я</label>
                        <input type="text" name="name"
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="Іван Іванов" required>
                        
                    </div>

                    <div class="form-group mb-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Телефон</label>
                        <input type="tel" name="phone"
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="+380 (XX) XXX XX XX" required>

                    <div class="form-group mb-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" name="email"
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="ivanivanov@example.com" required>
                    </div>



                    </div>
                    <div class="form-group mb-3">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Дата заїзду</label>
                                <input type="date" name="check_in"
                                    class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Дата виїзду</label>
                                <input type="date" name="check_out"
                                    class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                    required>
                            </div>
                        </div>
                    </div>
            </div>

            {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-warning">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}

            <button type="submit"
                class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg active:scale-95">
                Підтвердити бронювання
                


            </button>
            

            </form>
        </div>
    </div>
</div>
</div>

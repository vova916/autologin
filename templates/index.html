{% extends 'base.html' %}



{% block content %}
<h1>{{title}}</h1>
{% for room in rooms %}
<div class="card mb-3" style="max-width: 540px;">
    <div class="row g-0">
        <div class="col-md-4">
            {% if room.image %}
            <img src="{{room.image.url}}" class="img-fluid rounded-start" alt="...">
            {% endif %}

        </div>
        <div class="col-md-8">
            <div class="card-body">
                <h5 class="card-title">{{room.name}}</h5>
                <p class="card-text">{{room.description}}.</p>
                <p class="card-text"><small class="text-body-secondary">{{room.price}}</small></p>
            </div>
        </div>
    </div>
</div>



{% endfor %}
{% endblock %}
